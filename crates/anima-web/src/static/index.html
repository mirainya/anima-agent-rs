<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f13;--panel:#1a1a24;--border:#2a2a3a;--text:#e0e0e8;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a29bfe;--user-bg:#6c5ce7;--ai-bg:#252535;--green:#00b894;--red:#e17055;--yellow:#fdcb6e}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
</style>
</head>
<body>
<!-- 左侧：会话列表 -->
<aside id="sidebar">
  <div class="sidebar-header">
    <h2>Anima Agent</h2>
    <button id="btn-new-session" title="新建会话">+</button>
  </div>
  <div id="session-list"></div>
</aside>

<!-- 中间：聊天区域 -->
<main id="chat-area">
  <div id="chat-header">
    <span id="chat-title">新对话</span>
    <span id="connection-status" class="status-dot disconnected" title="SSE 未连接"></span>
  </div>
  <div id="messages"></div>
  <div id="typing-indicator" class="hidden">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>AI 正在思考...</span>
  </div>
  <form id="input-form">
    <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
    <button type="submit" id="btn-send">发送</button>
  </form>
</main>

<!-- 右侧：系统监控 -->
<aside id="monitor">
  <div class="monitor-header"><h3>系统监控</h3></div>
  <div id="agent-status" class="monitor-card">
    <h4>Agent 状态</h4>
    <div id="agent-running" class="status-line">
      <span class="status-dot"></span><span>加载中...</span>
    </div>
  </div>
  <div id="workers-panel" class="monitor-card">
    <h4>Workers</h4>
    <div id="workers-list"></div>
  </div>
  <div id="metrics-panel" class="monitor-card">
    <h4>指标</h4>
    <div id="metrics-list"></div>
  </div>
</aside>

<style>
/* 侧边栏 */
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:16px;font-weight:600}
#btn-new-session{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#btn-new-session:hover{background:var(--accent);border-color:var(--accent)}
#session-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item:hover{background:rgba(108,92,231,0.15)}
.session-item.active{background:rgba(108,92,231,0.25);color:var(--text)}

/* 聊天区域 */
#chat-area{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-weight:600}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--ai-bg);border-bottom-left-radius:4px}
.msg .reasoning{font-size:12px;color:var(--text2);border-left:2px solid var(--accent2);padding-left:10px;margin-bottom:8px;font-style:italic}

/* 输入区域 */
#input-form{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
#input{flex:1;background:var(--ai-bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;max-height:120px;font-family:inherit;outline:none}
#input:focus{border-color:var(--accent)}
#btn-send{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
#btn-send:hover{background:var(--accent2)}
#btn-send:disabled{opacity:0.5;cursor:not-allowed}

/* 打字指示器 */
#typing-indicator{padding:0 20px 8px;display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px}
#typing-indicator.hidden{display:none}
.typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent2);margin:0 2px;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* 监控面板 */
#monitor{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.monitor-header{padding:16px;border-bottom:1px solid var(--border)}
.monitor-header h3{font-size:14px;font-weight:600}
.monitor-card{padding:14px 16px;border-bottom:1px solid var(--border)}
.monitor-card h4{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}

/* 状态点 */
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.connected,.status-dot.running{background:var(--green)}
.status-dot.disconnected,.status-dot.stopped{background:var(--red)}
.status-dot.busy{background:var(--yellow);animation:pulse 1s infinite}
.status-dot.idle{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.status-line{display:flex;align-items:center;font-size:13px;margin-bottom:6px}

/* Worker 卡片 */
.worker-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.worker-card .worker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.worker-card .worker-id{font-size:11px;color:var(--text2);font-family:monospace}
.worker-card .worker-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.worker-badge.idle{background:rgba(0,184,148,0.15);color:var(--green)}
.worker-badge.busy{background:rgba(253,203,110,0.15);color:var(--yellow)}
.worker-badge.stopped{background:rgba(225,112,85,0.15);color:var(--red)}
.worker-card .worker-metrics{font-size:11px;color:var(--text2);display:flex;gap:12px}
.worker-task{margin:8px 0;padding:6px 8px;background:rgba(108,92,231,0.1);border-radius:6px;border-left:2px solid var(--accent)}
.worker-task .task-type{font-size:11px;font-weight:600;color:var(--accent2);display:flex;justify-content:space-between}
.worker-task .task-elapsed{color:var(--yellow);font-weight:400}
.worker-task .task-preview{font-size:11px;color:var(--text2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 指标 */
.metric-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.metric-row .label{color:var(--text2)}
.metric-row .value{font-weight:600;font-family:monospace}

/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
</style>

<script>
const state = {
  sessions: [],
  activeSession: null,
  messages: {},  // sessionId -> [{role, content}]
  sending: false,
};

const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $form = document.getElementById('input-form');
const $typing = document.getElementById('typing-indicator');
const $sessionList = document.getElementById('session-list');
const $chatTitle = document.getElementById('chat-title');
const $connStatus = document.getElementById('connection-status');
const $btnSend = document.getElementById('btn-send');

// ── 会话管理 ──
function createSession() {
  const id = 'session-' + Date.now();
  const session = { id, title: '新对话 ' + (state.sessions.length + 1) };
  state.sessions.push(session);
  state.messages[id] = [];
  switchSession(id);
  renderSessionList();
}

function switchSession(id) {
  state.activeSession = id;
  const session = state.sessions.find(s => s.id === id);
  $chatTitle.textContent = session ? session.title : '新对话';
  renderMessages();
  renderSessionList();
}

function renderSessionList() {
  $sessionList.innerHTML = state.sessions.map(s =>
    `<div class="session-item ${s.id === state.activeSession ? 'active' : ''}"
          onclick="switchSession('${s.id}')">${s.title}</div>`
  ).join('');
}

// ── 消息渲染 ──
function renderMessages() {
  const msgs = state.messages[state.activeSession] || [];
  $messages.innerHTML = msgs.map(m => {
    if (m.role === 'user') {
      return `<div class="msg user">${escapeHtml(m.content)}</div>`;
    }
    // AI 消息：分离 reasoning 和正文
    const parts = parseAiMessage(m.content);
    let html = '<div class="msg ai">';
    if (parts.reasoning) {
      html += `<div class="reasoning">${escapeHtml(parts.reasoning)}</div>`;
    }
    html += escapeHtml(parts.text) + '</div>';
    return html;
  }).join('');
  $messages.scrollTop = $messages.scrollHeight;
}

function parseAiMessage(content) {
  const match = content.match(/【Reasoning】\n([\s\S]*?)\n【End Reasoning】\n\n([\s\S]*)/);
  if (match) return { reasoning: match[1], text: match[2] };
  return { reasoning: null, text: content };
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addMessage(role, content) {
  if (!state.activeSession) createSession();
  const msgs = state.messages[state.activeSession];
  msgs.push({ role, content });
  // 更新会话标题（取第一条用户消息的前 20 字）
  if (role === 'user' && msgs.filter(m => m.role === 'user').length === 1) {
    const session = state.sessions.find(s => s.id === state.activeSession);
    if (session) {
      session.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
      renderSessionList();
    }
  }
  renderMessages();
}

// ── 发送消息 ──
async function sendMessage(content) {
  if (!content.trim() || state.sending) return;
  state.sending = true;
  $btnSend.disabled = true;
  addMessage('user', content);
  $typing.classList.remove('hidden');

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content,
        session_id: state.activeSession,
      }),
    });
    const data = await res.json();
    if (!data.ok) {
      addMessage('ai', '发送失败: ' + (data.error || '未知错误'));
      $typing.classList.add('hidden');
    }
  } catch (e) {
    addMessage('ai', '网络错误: ' + e.message);
    $typing.classList.add('hidden');
  } finally {
    state.sending = false;
    $btnSend.disabled = false;
  }
}

// ── SSE 连接 ──
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onopen = () => {
    $connStatus.className = 'status-dot connected';
    $connStatus.title = 'SSE 已连接';
  };
  es.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleSseEvent(event);
    } catch {}
  };
  es.onerror = () => {
    $connStatus.className = 'status-dot disconnected';
    $connStatus.title = 'SSE 断开，重连中...';
  };
}

function handleSseEvent(event) {
  switch (event.type) {
    case 'message':
      $typing.classList.add('hidden');
      addMessage('ai', event.content);
      break;
    case 'worker_status':
      updateWorkerCard(event.worker_id, event.status, event.task_type);
      break;
    case 'metrics':
      updateMetrics(event.data);
      break;
  }
}

// ── 系统监控 ──
async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();

    // Agent 状态
    const $agentRunning = document.getElementById('agent-running');
    const running = data.agent?.running;
    $agentRunning.innerHTML = `<span class="status-dot ${running ? 'running' : 'stopped'}"></span>
      <span>${running ? '运行中' : '已停止'}</span>`;

    // Workers
    const $workersList = document.getElementById('workers-list');
    if (data.workers && data.workers.length > 0) {
      $workersList.innerHTML = data.workers.map(w => {
        let taskHtml = '';
        if (w.current_task) {
          const ct = w.current_task;
          const elapsed = (ct.elapsed_ms / 1000).toFixed(1);
          const preview = escapeHtml(ct.content_preview || ct.task_type);
          taskHtml = `<div class="worker-task">
            <div class="task-type">${ct.task_type} <span class="task-elapsed">${elapsed}s</span></div>
            <div class="task-preview">${preview}</div>
          </div>`;
        }
        return `<div class="worker-card" data-worker-id="${w.id}">
          <div class="worker-header">
            <span class="worker-id">${w.id.slice(0, 8)}</span>
            <span class="worker-badge ${w.status}">${w.status}</span>
          </div>
          ${taskHtml}
          <div class="worker-metrics">
            <span>完成: ${w.metrics.tasks_completed}</span>
            <span>错误: ${w.metrics.errors}</span>
            <span>耗时: ${(w.metrics.total_duration_ms / 1000).toFixed(1)}s</span>
          </div>
        </div>`;
      }).join('');
    } else {
      $workersList.innerHTML = '<div style="font-size:12px;color:var(--text2)">暂无 Worker</div>';
    }

    // Metrics
    const $metricsList = document.getElementById('metrics-list');
    if (data.metrics) {
      $metricsList.innerHTML = Object.entries(data.metrics).map(([k, v]) =>
        `<div class="metric-row"><span class="label">${k.replace('anima_', '')}</span><span class="value">${v}</span></div>`
      ).join('');
    }
  } catch {}
}

function updateWorkerCard(workerId, status, taskType) {
  const card = document.querySelector(`[data-worker-id="${workerId}"]`);
  if (!card) return;
  const badge = card.querySelector('.worker-badge');
  if (badge) {
    badge.className = `worker-badge ${status}`;
    badge.textContent = status + (taskType ? ` (${taskType})` : '');
  }
}

function updateMetrics(data) {
  if (!data) return;
  const $metricsList = document.getElementById('metrics-list');
  $metricsList.innerHTML = Object.entries(data).map(([k, v]) =>
    `<div class="metric-row"><span class="label">${k}</span><span class="value">${v}</span></div>`
  ).join('');
}

// ── 事件绑定 ──
$form.addEventListener('submit', (e) => {
  e.preventDefault();
  const content = $input.value;
  $input.value = '';
  $input.style.height = 'auto';
  sendMessage(content);
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $form.dispatchEvent(new Event('submit'));
  }
});

$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});

document.getElementById('btn-new-session').addEventListener('click', createSession);

// ── 初始化 ──
createSession();
connectSSE();
pollStatus();
setInterval(pollStatus, 5000);
</script>
</body>
</html>
